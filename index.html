<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AugustoGames — Juega Gratis Online</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Exo+2:wght@700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07071a;
    --surface: #0f0f28;
    --surface2: #181835;
    --surface3: #212148;
    --border: rgba(255,255,255,0.07);
    --text: #eeeeff;
    --muted: #7878a8;
    --purple: oklch(65% 0.28 280);
    --cyan: oklch(72% 0.26 195);
    --orange: oklch(72% 0.26 45);
    --green: oklch(68% 0.26 145);
    --pink: oklch(68% 0.28 330);
    --font-display: 'Exo 2', sans-serif;
    --font-body: 'Nunito', sans-serif;
    --sidebar-w: 220px;
    --header-h: 64px;
    --radius: 14px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }
  #root { height: 100vh; display: flex; flex-direction: column; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 99px; }
  button { cursor: pointer; border: none; font-family: var(--font-body); }
  a { text-decoration: none; color: inherit; }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ag-games.jsx"></script>
<script type="text/babel" src="ag-games2.jsx"></script>
<script type="text/babel" src="ag-augusto.jsx"></script>
<script type="text/babel" src="ag-ui.jsx"></script>
<script type="text/babel" src="ag-app.jsx"></script>
</body>
</html>
